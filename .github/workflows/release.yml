name: 🚀 Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version or tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: 🧱 Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-24.04
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: macos-amd64
            runner: macos-15-intel
          - target: macos-arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${version}" ]]; then
            echo "❌ Release version is empty" >&2
            exit 1
          fi

          echo "🏷️ Building release ${version} for ${{ matrix.target }}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: ⚡ Cache Mill and dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.cache/mill
            ~/.ivy2/cache
          key: ${{ runner.os }}-${{ runner.arch }}-mill-${{ hashFiles('build.mill', 'mill') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-mill-

      - name: ☕ Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          distribution: graalvm
          java-version: "21"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: ✅ Compile and test
        shell: bash
        run: |
          echo "::group::🧪 Compile"
          ./mill __.compile
          echo "::endgroup::"
          echo "::group::🧫 Test"
          ./mill __.test
          echo "::endgroup::"

      - name: 🔥 Build GraalVM native CLI image
        id: native-image
        shell: bash
        run: |
          echo "::group::🔥 GraalVM native CLI image"
          echo "🔥 Building CLI app with Mill target app.nativeImage"
          native_ref="$(./mill show app.nativeImage | sed -n 's/^"\(.*\)"$/\1/p' | tail -n 1)"
          image_path="${native_ref#ref:v0:*:}"
          if [[ "${image_path}" == "${native_ref}" && ! -f "${image_path}" ]]; then
            image_path="${native_ref}"
          fi

          if [[ -z "${image_path}" || ! -f "${image_path}" ]]; then
            echo "❌ Native image was not produced at expected path: ${image_path}" >&2
            exit 1
          fi

          echo "✅ GraalVM native CLI image ready: ${image_path}"
          echo "path=${image_path}" >> "${GITHUB_OUTPUT}"
          echo "::endgroup::"

      - name: 📦 Package native CLI artifact
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          target="${{ matrix.target }}"
          package_root="dist/binstaller-${version}-${target}"
          archive="binstaller-${version}-${target}.tar.gz"

          echo "::group::📦 Package ${archive}"
          mkdir -p "${package_root}"
          cp "${{ steps.native-image.outputs.path }}" "${package_root}/binstaller"
          chmod +x "${package_root}/binstaller"

          echo "::group::🧪 Native CLI smoke test"
          "${package_root}/binstaller" --help >/tmp/binstaller-help.txt
          echo "✅ Native CLI starts and renders help"
          echo "::endgroup::"

          tar -C dist -czf "${archive}" "binstaller-${version}-${target}"
          shasum -a 256 "${archive}" > "${archive}.sha256"
          echo "✅ Artifact ready: ${archive}"
          echo "🔐 Checksum ready: ${archive}.sha256"
          echo "::endgroup::"

      - name: ⬆️ Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binstaller-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: |
            binstaller-${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz
            binstaller-${{ steps.version.outputs.value }}-${{ matrix.target }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: 🚢 Publish release
    runs-on: ubuntu-24.04
    needs:
      - build
    if: ${{ needs.build.result == 'success' }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${version}" ]]; then
            echo "❌ Release version is empty" >&2
            exit 1
          fi

          echo "🚢 Preparing release ${version}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          pattern: binstaller-${{ steps.version.outputs.value }}-*
          merge-multiple: true

      - name: 🧰 Add example config
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          example="release-artifacts/config.example.${version}.yaml"

          echo "::group::🧰 Example config"
          cp config.example.yaml "${example}"
          (cd release-artifacts && shasum -a 256 "config.example.${version}.yaml" > "config.example.${version}.yaml.sha256")
          echo "✅ Example config ready: ${example}"
          echo "🔐 Checksum ready: ${example}.sha256"
          echo "::endgroup::"

      - name: 🧰 Add install script
        shell: bash
        run: |
          echo "::group::🧰 Install script"
          cp scripts/install.sh release-artifacts/install.sh
          chmod +x release-artifacts/install.sh
          echo "✅ Install script ready: release-artifacts/install.sh"
          echo "::endgroup::"

      - name: 🔎 Verify release artifacts
        shell: bash
        run: |
          echo "::group::🔎 Artifact inventory"
          mapfile -t archives < <(find release-artifacts -type f -name '*.tar.gz' | sort)
          printf '📦 %s\n' "${archives[@]}"
          echo "::endgroup::"

          if [[ "${#archives[@]}" -lt 1 ]]; then
            echo "❌ No build artifacts found for ${{ steps.version.outputs.value }}" >&2
            exit 1
          fi

          example="release-artifacts/config.example.${{ steps.version.outputs.value }}.yaml"
          if [[ ! -f "${example}" || ! -f "${example}.sha256" ]]; then
            echo "❌ Missing example config or checksum" >&2
            exit 1
          fi
          echo "✅ Example config"

          if [[ ! -f release-artifacts/install.sh ]]; then
            echo "❌ Missing install script" >&2
            exit 1
          fi
          echo "✅ Install script"

          echo "::group::🧾 Required target check"
          expected_targets=(linux-amd64 linux-arm64 macos-amd64 macos-arm64)
          for target in "${expected_targets[@]}"; do
            archive="release-artifacts/binstaller-${{ steps.version.outputs.value }}-${target}.tar.gz"
            checksum="${archive}.sha256"
            if [[ ! -f "${archive}" || ! -f "${checksum}" ]]; then
              echo "❌ Missing release artifact or checksum for ${target}" >&2
              exit 1
            fi
            echo "✅ ${target}"
          done
          echo "::endgroup::"

          echo "::group::🔐 Checksum verification"
          (cd release-artifacts && shasum -a 256 -c ./*.sha256)
          echo "::endgroup::"

      - name: 🚀 Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          notes=$'🚀 Automated binstaller release for '"${version}"$'.\n\nInstall on Linux:\n\n```\ncurl --proto \'=https\' --tlsv1.2 -sSfL https://github.com/worxbend/binstaller/releases/latest/download/install.sh | sh\n```\n\nArtifacts:\n- 🐧 Linux amd64 GraalVM native CLI\n- 🐧 Linux arm64 GraalVM native CLI\n- 🍎 macOS amd64 GraalVM native CLI\n- 🍎 macOS arm64 GraalVM native CLI\n- 🧰 Example configuration\n- 📜 install.sh\n\nEach binary and config asset includes a 🔐 SHA-256 checksum.'

          if gh release view "${version}" >/dev/null 2>&1; then
            echo "♻️ Updating existing release ${version}"
            gh release upload "${version}" release-artifacts/* --clobber
          else
            echo "🚀 Creating release ${version}"
            gh release create "${version}" release-artifacts/* \
              --target "${GITHUB_SHA}" \
              --title "${version}" \
              --notes "${notes}"
          fi
          echo "🎉 Release ${version} is published"

  snap:
    name: 📦 Snap ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs:
      - release
    if: ${{ needs.release.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: linux-amd64
            runner: ubuntu-24.04
          - arch: arm64
            target: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi

          if [[ -z "${version}" ]]; then
            echo "❌ Release version is empty" >&2
            exit 1
          fi

          echo "🏷️ Building snap ${version} for ${{ matrix.arch }}"
          echo "value=${version}" >> "${GITHUB_OUTPUT}"
          echo "number=${version#v}" >> "${GITHUB_OUTPUT}"

      - name: 📥 Download native CLI artifact
        uses: actions/download-artifact@v4
        with:
          name: binstaller-${{ steps.version.outputs.value }}-${{ matrix.target }}
          path: release-artifacts

      - name: 📦 Stage snap payload
        shell: bash
        run: |
          version="${{ steps.version.outputs.value }}"
          target="${{ matrix.target }}"
          archive="release-artifacts/binstaller-${version}-${target}.tar.gz"

          echo "::group::📦 Extract ${archive}"
          mkdir -p snap-stage
          tar -xzf "${archive}" -C snap-stage --strip-components=1 "binstaller-${version}-${target}/binstaller"
          chmod +x snap-stage/binstaller
          echo "::endgroup::"

      - name: 🏷️ Set snap version
        shell: bash
        run: |
          sed -i "s/^version: .*/version: \"${{ steps.version.outputs.number }}\"/" snap/snapcraft.yaml

      - name: 🛠️ Install snapcraft
        shell: bash
        run: sudo snap install snapcraft --classic

      - name: 🔥 Build classic snap
        shell: bash
        run: snapcraft --destructive-mode --verbosity=verbose

      - name: 🔎 Locate built snap
        id: snap-file
        shell: bash
        run: |
          snap_file="$(find . -maxdepth 1 -name '*.snap' | head -n 1)"
          if [[ -z "${snap_file}" ]]; then
            echo "❌ No .snap file was produced" >&2
            exit 1
          fi
          echo "✅ Built ${snap_file}"
          echo "path=${snap_file}" >> "${GITHUB_OUTPUT}"

      - name: ⬆️ Upload snap artifact
        uses: actions/upload-artifact@v4
        with:
          name: binstaller-${{ steps.version.outputs.value }}-snap-${{ matrix.arch }}
          path: ${{ steps.snap-file.outputs.path }}
          if-no-files-found: error

      - name: 🚀 Publish to Snap Store (stable, classic)
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        shell: bash
        run: |
          if [[ -z "${SNAPCRAFT_STORE_CREDENTIALS}" ]]; then
            echo "⚠️ SNAPCRAFT_STORE_CREDENTIALS is not set; skipping Snap Store upload" >&2
            exit 0
          fi
          snapcraft upload "${{ steps.snap-file.outputs.path }}" --release=stable
